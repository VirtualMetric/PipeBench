name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build & Vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Build harness CLI
        run: make build

      - name: Go vet
        run: go vet ./...

      - name: Build generator module
        run: cd containers/generator && go build ./...

      - name: Build receiver module
        run: cd containers/receiver && go build ./...

      - name: Build collector module
        run: cd containers/collector && go build ./...

  containers:
    name: Build Container Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build generator image
        run: make build-generator

      - name: Build receiver image
        run: make build-receiver

      - name: Build collector image
        run: make build-collector

  smoke-test-vector:
    name: Smoke Test (tcp_to_tcp + Vector)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Build harness
        run: make build

      - name: Build container images
        run: make build-containers

      - name: Run tcp_to_tcp_performance with Vector
        run: ./bin/harness test -t tcp_to_tcp_performance -s vector --timeout 5m --no-cleanup || true

      - name: Show results
        if: always()
        run: cat results/tcp_to_tcp_performance/default/vector/*/*/summary.json 2>/dev/null || echo "No results found"

      - name: Show container logs on failure
        if: always()
        run: |
          echo "=== Generator ===" && docker logs bench-generator 2>&1 || true
          echo "=== Subject ===" && docker logs bench-subject-vector 2>&1 || true
          echo "=== Receiver ===" && docker logs bench-receiver 2>&1 || true
          echo "=== Collector ===" && docker logs bench-collector 2>&1 || true

      - name: Cleanup containers
        if: always()
        run: ./bin/harness clean 2>/dev/null || true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-results-vector
          path: results/
          retention-days: 30

  smoke-test-filebeat:
