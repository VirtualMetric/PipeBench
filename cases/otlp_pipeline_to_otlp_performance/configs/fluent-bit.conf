# fluent-bit → OTLP/HTTP head-to-head config with a single modify
# filter that adds a static field to every record. Mirrors the
# `set` processor in vmetric's pipeline config so the per-record
# decode → mutate → re-encode cost is comparable across subjects.

[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info

[INPUT]
    Name              opentelemetry
    Listen            0.0.0.0
    Port              4318
    Tag               otel.logs

[FILTER]
    Name              modify
    Match             *
    Add               bench_marker pipeline

[OUTPUT]
    Name              opentelemetry
    Match             *
    Host              receiver
    Port              4318
    Logs_uri          /v1/logs
    Compress          gzip
