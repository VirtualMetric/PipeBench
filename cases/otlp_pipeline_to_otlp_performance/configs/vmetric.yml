devices:
  - id: 1
    name: otel-bench
    type: otel
    properties:
      address: "0.0.0.0"
      # gRPC disabled so this case isolates the HTTP ingress path: a regression
      # serving gRPC instead of HTTP fails (nothing bound on 4317) instead of
      # silently passing on an always-open listener.
      otlp_grpc_status: false
      otlp_http_status: true
      otlp_logs_status: true
      otlp_metrics_status: false
      otlp_traces_status: false

targets:
  - name: otlp-target-bench
    type: otlp
    properties:
      url: "http://receiver:4318"
      path: "/v1/logs"
      format: "protobuf"
      compression: true

# Route references the pipeline by name; processors live in the
# top-level `pipelines:` block (same shape as
# real_world_1_performance/configs/vmetric.yml). Triggers the
# router worker's decode → JSON pipeline → re-encode round-trip
# for every record on this route.
routes:
  - name: otel-to-otlp-bench
    devices:
      - name: otel-bench
    pipelines:
      - name: otel-route-marker
    targets:
      - name: otlp-target-bench

pipelines:
  - name: otel-route-marker
    processors:
      - set:
          field: _vmetric.pipeline_marker
          value: route
