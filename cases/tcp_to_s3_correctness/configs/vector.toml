# Vector configuration for tcp_to_s3_correctness — TCP in, aws_s3 sink to
# LocalStack. Short batch timeout keeps the drain window sane.
# Credentials/region come from the harness-injected AWS_* environment.

[sources.in]
type = "socket"
mode = "tcp"
address = "0.0.0.0:9000"
decoding.codec = "bytes"
framing.method = "newline_delimited"

[sinks.out]
type = "aws_s3"
inputs = ["in"]
bucket = "bench-out"
key_prefix = "vector/"
region = "us-east-1"
endpoint = "http://localstack:4566"
force_path_style = true

[sinks.out.healthcheck]
enabled = false

[sinks.out.encoding]
codec = "text"

[sinks.out.batch]
max_bytes = 10485760
timeout_secs = 2
