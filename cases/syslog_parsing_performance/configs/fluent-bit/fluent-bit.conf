[SERVICE]
    Flush        1
    Log_Level    warn
    Parsers_File parsers.conf

[INPUT]
    Name         tcp
    Listen       0.0.0.0
    Port         9000
    Format       none

[FILTER]
    Name         parser
    Match        *
    Key_Name     log
    Parser       syslog-rfc3164
    Reserve_Data On

[OUTPUT]
    Name         tcp
    Match        *
    Host         receiver
    Port         9001
    Format       json_lines
