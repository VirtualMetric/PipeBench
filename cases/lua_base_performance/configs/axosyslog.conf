@version: 4.2

# axosyslog has no Lua; use a simple rewrite that sets a single field.
# This measures the cheapest per-record native transform overhead, comparable
# to what Lua/VRL do in other subjects.
source s_tcp {
    tcp(
        ip("0.0.0.0")
        port(9000)
        flags(no-parse)
    );
};

rewrite r_set {
    set("axosyslog-pipeline", value(".processed_by"));
};

destination d_tcp {
    tcp(
        "receiver"
        port(9001)
    );
};

log {
    source(s_tcp);
    rewrite(r_set);
    destination(d_tcp);
};
