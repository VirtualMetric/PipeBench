[[inputs.socket_listener]]
  service_address = "tcp://0.0.0.0:9000"
  data_format = "value"
  data_type = "string"

[[outputs.socket_writer]]
  address = "tcp://receiver:9001"
  data_format = "influx"

[agent]
  metric_buffer_limit = 10000000
  metric_batch_size = 10000
  flush_interval = "100ms"
  flush_jitter = "0s"
