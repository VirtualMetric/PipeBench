name: disk_buffer_crash_performance
type: performance
description: "Measures throughput when every subject is in its strongest crash-safe disk-buffer mode (fsync per write / reliable / crash_resistance). Quantifies the EPS cost of zero-loss durability against the baseline disk_buffer_performance test."

duration: 60s
warmup: 10s

generator:
  mode: tcp
  target: "subject:9000"
  rate: 0
  line_size: 256
  format: raw

receiver:
  mode: tcp
  listen: ":9001"

subjects:
  - vmetric
  - vector
  - fluent-bit
  - fluentd
  - logstash
  - nxlog
  - axosyslog
  - tenzir
  - cribl-stream

configurations:
  default:
    description: "TCP in, disk buffer with fsync-per-write, TCP out"
