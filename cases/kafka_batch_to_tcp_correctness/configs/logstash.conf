# Consume the Kafka topic and forward to the TCP receiver. The json codec
# natively splits a JSON array (the generator packs 10 objects per message as
# [{...},...]) into one event per element, so the receiver sees one line per
# original record (2000). This is the same codec=>json behaviour as
# kafka_to_tcp_correctness; here it is the point of the test.
input {
  kafka {
    bootstrap_servers => "redpanda:9092"
    topics => ["bench"]
    group_id => "bench"
    auto_offset_reset => "earliest"
    codec => json
  }
}

output {
  tcp {
    host => "receiver"
    port => 9001
    codec => json_lines
  }
}
