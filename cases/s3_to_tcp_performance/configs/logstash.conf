input {
  s3 {
    bucket => "bench-in"
    region => "us-east-1"
    endpoint => "http://localstack:4566"
    additional_settings => { "force_path_style" => "true" }
    prefix => "in/"
    interval => 1
    delete => true
    sincedb_path => "/tmp/s3-sincedb"
    codec => plain
  }
}

output {
  tcp {
    host => "receiver"
    port => 9001
    codec => line { format => "%{message}" }
  }
}
