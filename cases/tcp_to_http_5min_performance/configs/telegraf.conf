[[inputs.socket_listener]]
  service_address = "tcp://0.0.0.0:9000"
  data_format = "value"
  data_type = "string"

[[outputs.http]]
  url = "http://receiver:9001/"
  method = "POST"
  data_format = "influx"
  content_encoding = "identity"
  timeout = "10s"
  idle_conn_timeout = 60

[agent]
  metric_buffer_limit = 10000000
  metric_batch_size = 10000
  flush_interval = "100ms"
  flush_jitter = "0s"
