@version: 4.2

source s_tcp {
    tcp(
        ip("0.0.0.0")
        port(9000)
        max-connections(500)
        log-iw-size(500000)
        log-fetch-limit(1000)
        flags(no-parse)
    );
};

destination d_http {
    http(
        url("http://receiver:9001/")
        method("POST")
        body("${MESSAGE}")
        workers({{.CPUs}})
        batch-lines(1000)
        batch-timeout(100)
    );
};

log {
    source(s_tcp);
    destination(d_http);
    flags(flow-control);
};
