@version: 4.2

source s_tcp {
    tcp(
        ip("0.0.0.0")
        port(9000)
        flags(no-parse)
    );
};

destination d_http {
    http(
        url("http://receiver:9001/")
        method("POST")
        body("${MESSAGE}")
        workers(4)
        batch-lines(1000)
        batch-timeout(100)
    );
};

log {
    source(s_tcp);
    destination(d_http);
};
