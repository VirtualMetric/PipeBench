name: tcp_to_http_5min_performance
type: performance
description: "Measures sustained throughput of TCP-in to HTTP-out pipeline (5 minutes)"

duration: 300s
warmup: 10s

generator:
  mode: tcp
  target: "subject:9000"
  rate: 0
  line_size: 256
  format: raw

receiver:
  mode: http
  listen: ":9001"

subjects:
  - vector
  - fluent-bit
  - fluentd
  - logstash
  - axosyslog
  - vmetric

configurations:
  default:
    description: "Receive TCP, POST to HTTP endpoint"
