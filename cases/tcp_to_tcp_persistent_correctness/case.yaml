name: tcp_to_tcp_persistent_correctness
type: persistence_correctness
description: "Verifies that logs sent while the receiver is down are persisted and delivered once the receiver starts"

duration: 10s
warmup: 10s

generator:
  mode: tcp
  target: "subject:9000"
  rate: 25000
  total_lines: 25000
  line_size: 256
  format: raw

receiver:
  mode: tcp
  listen: ":9001"

subjects:
  - vmetric
  - vector
  - fluent-bit
  - fluentd
  - logstash
  - axosyslog

correctness:
  validate_order: false
  validate_dedup: true
  expected_loss_pct: 0.0

configurations:
  default:
    description: "Send logs with receiver down, start receiver, verify all logs arrive"
