[SERVICE]
    Flush         1
    Log_Level     warn
    storage.path  /var/log/flb-storage/
    storage.sync  normal
    storage.checksum off
    storage.max_chunks_up 128

[INPUT]
    Name          tcp
    Listen        0.0.0.0
    Port          9000
    Format        none
    storage.type  filesystem

[OUTPUT]
    Name          tcp
    Match         *
    Host          receiver
    Port          9001
    Format        json_lines
    storage.total_limit_size 4G
