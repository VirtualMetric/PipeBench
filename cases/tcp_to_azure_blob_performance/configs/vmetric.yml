devices:
  - id: 1
    name: tcp-bench
    type: tcp
    properties:
      address: "0.0.0.0"
      port: 9000
targets:
  - name: azblob-target-bench
    type: azblob
    properties:
      # Azurite's well-known development-storage account — public emulator
      # constants, not secrets.
      connection_string: "DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;BlobEndpoint=http://azurite:10000/devstoreaccount1;"
      container: "bench-out"
      format: json
      # More sender workers overlap PutBlob round trips. Azurite is a
      # single-threaded emulator: 8 measured ~2x faster than 24 (which
      # floods it with concurrent 25MB uploads).
      queue:
        parallelism: 8
routes:
  - name: tcp-to-azblob-bench
    devices:
      - name: tcp-bench
    targets:
      - name: azblob-target-bench
