<source>
  @type tcp
  tag bench
  bind 0.0.0.0
  port 9000
  <parse>
    @type regexp
    expression /^<(?<pri>\d+)>(?<timestamp>[^ ]+) (?<host>[^ ]+) (?<ident>[^\[\:]+)(?:\[(?<pid>\d+)\])?: (?<message>.*)$/
  </parse>
</source>

<filter bench>
  @type grep
  <exclude>
    key severity
    pattern /debug/
  </exclude>
</filter>

<match bench>
  @type tcp
  host receiver
  port 9001
  <format>
    @type single_value
    message_key message
    add_newline true
  </format>
  <buffer>
    flush_interval 1s
    flush_mode interval
    chunk_limit_size 1m
  </buffer>
</match>
