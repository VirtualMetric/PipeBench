<source>
  @type tcp
  tag bench
  bind 0.0.0.0
  port 9000
  <parse>
    @type regexp
    expression /^<(?<pri>\d+)>(?<timestamp>[^ ]+) (?<host>[^ ]+) (?<ident>[^\[\:]+)(?:\[(?<pid>\d+)\])?: (?<message>.*)$/
  </parse>
</source>

# Tag debug records with `dropped: true` instead of excluding them.
# Dropping records would skew the receiver's EPS measurement.
<filter bench>
  @type record_transformer
  enable_ruby true
  <record>
    dropped ${record["severity"] == "debug"}
  </record>
</filter>

<match bench>
  @type tcp
  host receiver
  port 9001
  <format>
    @type single_value
    message_key message
    add_newline true
  </format>
  <buffer>
    flush_interval 1s
    flush_mode interval
    chunk_limit_size 1m
  </buffer>
</match>
