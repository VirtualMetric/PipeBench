<source>
  @type tcp
  tag bench
  bind 0.0.0.0
  port 9000
  <parse>
    @type syslog
  </parse>
</source>

<filter bench>
  @type grep
  <exclude>
    key severity
    pattern /debug/
  </exclude>
</filter>

<match bench>
  @type forward
  <server>
    host receiver
    port 9001
  </server>
  flush_interval 1s
</match>
