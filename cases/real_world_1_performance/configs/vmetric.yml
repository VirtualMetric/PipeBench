devices:
  - id: 1
    name: tcp-bench
    type: tcp
    properties:
      address: "0.0.0.0"
      port: 9000
targets:
  - name: tcp-target-bench
    type: tcp
    properties:
      address: "receiver"
      port: 9001
routes:
  - name: tcp-to-tcp-bench
    devices:
      - name: tcp-bench
    pipelines:
      - name: real-world
    targets:
      - name: tcp-target-bench
# Real-world shape: parse syslog → tag debug records → forward.
# Mirrors the Vector remap pipeline in configs/vector.toml.
# Note: we tag debug records with `dropped: true` instead of dropping
# them — actually dropping skews the receiver's EPS measurement
# downward, which is not the throughput we want to compare.
pipelines:
  - name: real-world
    processors:
      - syslog:
          field: message
          ignore_missing: true
          ignore_failure: true
      - set:
          if: 'log?.syslog?.severity?.name == "Debug"'
          field: dropped
          value: true
          ignore_failure: true
