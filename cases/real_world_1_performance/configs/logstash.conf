input {
  tcp {
    port => 9000
    codec => line
  }
}

filter {
  grok {
    match => { "message" => "<%{POSINT:priority}>%{TIMESTAMP_ISO8601:timestamp} %{HOSTNAME:host} %{PROG:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:msg}" }
  }
  # Tag debug records with `dropped: "true"` instead of dropping them.
  # Dropping records would skew the receiver's EPS measurement.
  if [severity] == "debug" {
    mutate {
      add_field => { "dropped" => "true" }
    }
  }
}

output {
  tcp {
    host => "receiver"
    port => 9001
    codec => json_lines
  }
}
