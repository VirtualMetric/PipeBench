input {
  tcp {
    port => 9000
    codec => line
  }
}

filter {
  grok {
    match => { "message" => "<%{POSINT:priority}>%{TIMESTAMP_ISO8601:timestamp} %{HOSTNAME:host} %{PROG:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:msg}" }
  }
  if [severity] == "debug" {
    drop {}
  }
}

output {
  tcp {
    host => "receiver"
    port => 9001
    codec => json_lines
  }
}
