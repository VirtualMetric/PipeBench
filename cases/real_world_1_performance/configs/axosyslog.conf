@version: 4.2

source s_tcp {
    tcp(
        ip("0.0.0.0")
        port(9000)
        flags(syslog-protocol)
    );
};

# Tag debug records with `dropped = "true"` instead of filtering
# them out. Dropping records would skew the receiver's EPS
# measurement.
filter f_debug {
    level(debug);
};

rewrite r_mark_dropped {
    set("true", value(".dropped"));
};

destination d_tcp {
    tcp(
        "receiver"
        port(9001)
    );
};

log {
    source(s_tcp);
    if (filter(f_debug)) {
        rewrite(r_mark_dropped);
    };
    destination(d_tcp);
};
