[SERVICE]
    Flush        1
    Log_Level    warn
    Parsers_File parsers.conf

[INPUT]
    Name         tcp
    Listen       0.0.0.0
    Port         9000
    Format       none

[FILTER]
    Name         parser
    Match        *
    Key_Name     log
    Parser       syslog-rfc3164
    Reserve_Data On

# Tag debug records with `dropped: true` instead of excluding them.
# The regex parser captures `pri` (priority code) but not `severity` name,
# so we compute severity from pri via Lua: severity = pri % 8, debug = 7.
# Dropping records would skew the receiver's EPS measurement.
[FILTER]
    Name         lua
    Match        *
    Script       /fluent-bit/etc/tag_debug.lua
    Call         tag_debug

[OUTPUT]
    Name         tcp
    Match        *
    Host         receiver
    Port         9001
    Format       json_lines
