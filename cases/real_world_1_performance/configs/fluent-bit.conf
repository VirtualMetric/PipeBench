[SERVICE]
    Flush        1
    Log_Level    warn
    Parsers_File /fluent-bit/etc/parsers.conf

[INPUT]
    Name         tcp
    Listen       0.0.0.0
    Port         9000
    Format       none

[FILTER]
    Name         parser
    Match        *
    Key_Name     log
    Parser       syslog-rfc3164
    Reserve_Data On

# Tag debug records with `dropped: true` instead of excluding them.
# Dropping records would skew the receiver's EPS measurement.
[FILTER]
    Name         modify
    Match        *
    Condition    Key_value_equals severity debug
    Add          dropped true

[OUTPUT]
    Name         tcp
    Match        *
    Host         receiver
    Port         9001
    Format       json_lines
