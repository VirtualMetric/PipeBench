<Extension _syslog>
    Module xm_syslog
</Extension>

<Input tcp_in>
    Module im_tcp
    Host 0.0.0.0
    Port 9000
    Exec parse_syslog_bsd(); \
         if ($SeverityValue == 7) drop();
</Input>

<Output tcp_out>
    Module om_tcp
    Host receiver
    Port 9001
</Output>

<Route bench>
    Path tcp_in => tcp_out
</Route>
