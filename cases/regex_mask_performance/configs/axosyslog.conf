@version: 4.2

source s_tcp {
    tcp(
        ip("0.0.0.0")
        port(9000)
        max-connections(500)
        log-iw-size(500000)
        log-fetch-limit(1000)
        flags(no-parse)
    );
};

rewrite r_mask_conn {
    subst("CONN=[0-9]+", "CONN=***", value("MESSAGE"), flags("global"));
};

destination d_tcp {
    tcp(
        "receiver"
        port(9001)
    );
};

log {
    source(s_tcp);
    rewrite(r_mask_conn);
    destination(d_tcp);
};
