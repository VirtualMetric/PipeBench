persistent_storage:
  status: true
  crash_resistance: true
devices:
  - id: 1
    name: tcp-bench
    type: tcp
    properties:
      address: "0.0.0.0"
      port: 9000
targets:
  - name: http-target-bench
    type: http
    properties:
      url: "http://receiver:9001"
      method: POST
      format: message
      content_type: "application/x-ndjson"
      batch_size: 1000
      compression: false
      keep_alive: true
routes:
  - name: tcp-to-http-bench
    devices:
      - name: tcp-bench
    targets:
      - name: http-target-bench
