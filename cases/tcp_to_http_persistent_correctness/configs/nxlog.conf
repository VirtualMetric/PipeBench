<Input tcp_in>
    Module im_tcp
    Host 0.0.0.0
    Port 9000
</Input>

<Processor disk_buffer>
    Module pm_buffer
    MaxSize 65536
    Type Disk
    Directory /var/spool/nxlog
</Processor>

<Output http_out>
    Module om_http
    URL http://receiver:9001/
    ContentType text/plain
</Output>

<Route bench>
    Path tcp_in => disk_buffer => http_out
</Route>
