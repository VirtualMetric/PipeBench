[SERVICE]
    Flush                 1
    Log_Level             warn
    storage.path          /tmp/fluent-bit-storage/
    storage.sync          normal
    storage.backlog.mem_limit  512M

[INPUT]
    Name         tcp
    Listen       0.0.0.0
    Port         9000
    Format       none
    Chunk_Size   256k
    Buffer_Size  512k
    storage.type filesystem

[OUTPUT]
    Name              http
    Match             *
    Host              receiver
    Port              9001
    URI               /
    Format            json_lines
    storage.total_limit_size 2G
    Retry_Limit       false
