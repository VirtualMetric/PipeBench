<source>
  @type tcp
  tag bench
  bind 0.0.0.0
  port 9000
  <parse>
    @type none
  </parse>
</source>

<match bench>
  @type http
  endpoint http://receiver:9001/
  content_type text/plain
  <buffer>
    @type file
    path /tmp/fluentd-buffer/
    flush_interval 1s
    flush_mode interval
    chunk_limit_size 1m
    total_limit_size 2g
  </buffer>
</match>
