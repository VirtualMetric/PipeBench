# vmetric variant: ClickHouse target, TabSeparatedRaw over the HTTP interface
# (:8123) + gzip — the raw message bytes go straight into one column with NO JSON
# parsing on the server, the fastest text path. Selected with `-c tsv`.
devices:
  - id: 1
    name: tcp-in
    type: tcp
    properties:
      address: "0.0.0.0"
      port: 9000

targets:
  - name: ch-out
    type: clickhouse
    properties:
      address: "clickhouse"
      port: 8123
      database: "bench"
      table: "logs"
      username: "bench"
      password: "benchpass"
      format: "tabseparatedraw"
      use_compression: true

routes:
  - name: tcp-to-ch
    devices:
      - name: tcp-in
    targets:
      - name: ch-out
