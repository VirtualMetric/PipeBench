name: file_rotate_truncate_correctness
type: correctness
description: "Verifies no data loss when log files are rotated by truncation"

duration: 60s
warmup: 10s

generator:
  mode: file
  target: "/data/input.log"
  rate: 500
  line_size: 256
  format: raw
  connections: 1
  file_rotation:
    mode: copytruncate
    at: 30s
    quiesce: 200ms
    archive_suffix: ".1"

receiver:
  mode: tcp
  listen: ":9001"

subjects:
  - vmetric
  - vector
  - fluent-bit
  - fluentd
  - filebeat
  - logstash
  - nxlog
  - axosyslog
  - tenzir
  - cribl-stream

correctness:
  validate_dedup: true
  expected_loss_pct: 0.0

configurations:
  default:
    description: "Tail file with truncation-based rotation"
