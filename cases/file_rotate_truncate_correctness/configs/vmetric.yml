devices:
  - id: 1
    name: file-bench
    type: file
    properties:
      # Glob tail across /data/*.log so vmetric sees both the
      # archived input.log.1 (snapshot of the pre-truncate content)
      # and the live input.log (truncated then re-appended). The
      # reader's offset correlation across rotations forwards the
      # un-read tail of the archive without re-emitting content
      # already shipped from the live file.
      path: "/data/*.log"
      poll_interval: 1
      start_date: -1
      ignore_time: true
      ignore_old_date: true
      ignore_retention: true
      compute_pattern: false
      compute_level: false
      line_parser:
        type: newline
targets:
  - name: tcp-target-bench
    type: tcp
    properties:
      address: "receiver"
      port: 9001
routes:
  - name: file-to-tcp-bench
    devices:
      - name: file-bench
    targets:
      - name: tcp-target-bench
