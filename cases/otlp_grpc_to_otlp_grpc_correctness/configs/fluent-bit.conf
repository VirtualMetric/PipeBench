# fluent-bit → OTLP/gRPC head-to-head config.
#
# Input: opentelemetry — bound to 4317 so the bench generator
# (which targets subject:4317 in this case) hits it directly.
# Fluent-bit's OTLP input has served gRPC over the same port as
# HTTP since 3.0+, but the *port number* doesn't migrate by
# default — we override 4318→4317 here to match the case wiring.
#
# Output: opentelemetry — `grpc on` switches the wire from HTTP
# to gRPC. Port 4317 targets the bench receiver's gRPC endpoint.

[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info

[INPUT]
    Name              opentelemetry
    Listen            0.0.0.0
    Port              4317
    Tag               otel.logs

[OUTPUT]
    Name              opentelemetry
    Match             *
    Host              receiver
    Port              4317
    grpc              on
    Compress          gzip
