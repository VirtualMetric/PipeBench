name: kafka_crash_correctness
type: kafka_crash_correctness
description: "Hard-crash (SIGKILL) durability: subject consumes from Kafka while the receiver is down, is killed with no graceful shutdown, restarted, and must deliver every record"

duration: 30s
# The subject (Kafka consumer) reads from LATEST, so it must have joined the
# group before the generator produces — warmup must exceed the director's
# startup (~15-21s). Phase 1 starts the subject; the generator's warmup then
# holds production until the consumer is subscribed.
warmup: 30s

kafka:
  topic: bench
  partitions: 1

generator:
  mode: kafka
  target: "redpanda:9092"
  format: json
  rate: 0
  line_size: 256
  connections: 1
  total_lines: 2000
  kafka_batch: 1

receiver:
  mode: tcp
  listen: ":9001"

subjects:
  - vmetric

correctness:
  # At-least-once: a SIGKILL gives no chance to flush, so only records already
  # persisted to the on-disk queue (or still uncommitted in Kafka) are
  # recoverable. Both paths must combine to deliver every record (0% loss).
  # Duplicates from recovery are allowed.
  expected_loss_pct: 0.0

configurations:
  default:
    description: "Consume from Kafka with crash_resistance; SIGKILL the subject, restart, verify no loss"
