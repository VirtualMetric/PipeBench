# Consume the Kafka topic and forward to the TCP receiver. The json codec
# decodes each message; a JSON array (kafka_batch > 1) is natively split into
# one event per element, so logstash is the one subject here that yields
# matching record counts for batched-array messages as well as kafka_batch=1.
input {
  kafka {
    bootstrap_servers => "redpanda:9092"
    topics => ["bench"]
    group_id => "bench"
    auto_offset_reset => "earliest"
    codec => json
  }
}

output {
  tcp {
    host => "receiver"
    port => 9001
    codec => json_lines
  }
}
