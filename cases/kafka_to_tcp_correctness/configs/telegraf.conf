# Consume the Kafka topic and forward to the TCP receiver. The kafka_consumer
# input reads each message as a raw string value (one metric per message); the
# socket_writer emits one influx line per metric, so one Kafka message becomes
# one received line (count preserved; telegraf is metrics-oriented so the line
# is influx-formatted rather than the verbatim payload).
[[inputs.kafka_consumer]]
  brokers = ["redpanda:9092"]
  topics = ["bench"]
  consumer_group = "bench"
  offset = "oldest"
  # Pin a modern protocol version; the sarama default is too old for Redpanda
  # and the consumer fails with "error while consuming bench/0: EOF".
  version = "2.8.0"
  data_format = "value"
  data_type = "string"

[[outputs.socket_writer]]
  address = "tcp://receiver:9001"
  data_format = "influx"

[agent]
  metric_buffer_limit = 10000000
  metric_batch_size = 10000
  flush_interval = "100ms"
  flush_jitter = "0s"
