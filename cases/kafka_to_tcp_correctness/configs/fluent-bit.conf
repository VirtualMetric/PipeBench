[SERVICE]
    Flush        1
    Log_Level    warn

# Consume the Kafka topic and forward to the TCP receiver. format none keeps
# the raw message payload (one JSON object per Kafka message at kafka_batch=1)
# under the `payload` key; json_lines output emits one newline-terminated line
# per record, so one Kafka message becomes exactly one received line.
[INPUT]
    Name              kafka
    Brokers           redpanda:9092
    Topics            bench
    format            none
    # librdkafka consumer props: stable group + read from the start of the
    # topic so records produced before the consumer joined are not missed.
    rdkafka.group.id            bench
    rdkafka.auto.offset.reset   earliest

[OUTPUT]
    Name         tcp
    Match        *
    Host         receiver
    Port         9001
    Format       json_lines
