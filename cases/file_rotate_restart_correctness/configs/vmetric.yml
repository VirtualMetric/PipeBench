profiler:
  status: false
  remote: false
devices:
  - id: 1
    name: file-bench
    type: file
    properties:
      # Single-file tail. Harness SIGTERMs the subject mid-test; on
      # restart vmetric reads its per-file CacheInfo (file size +
      # position) from /storage/cache and resumes from there. To
      # actually catch up on the un-read tail of the pre-rotation
      # archive (input.log.1), the subject would need to follow the
      # rename — this case is the explicit "did you do that?" check.
      path: "/data/input.log"
      poll_interval: 1
      # Cache must survive the SIGTERM/restart for resume to work;
      # leaving ignore_cache at default (false) is the whole point.
      start_date: -1
      ignore_time: true
      ignore_old_date: true
      ignore_retention: true
      compute_pattern: false
      compute_level: false
      line_parser:
        type: newline
targets:
  - name: tcp-target-bench
    type: tcp
    properties:
      address: "receiver"
      port: 9001
routes:
  - name: file-to-tcp-bench
    devices:
      - name: file-bench
    targets:
      - name: tcp-target-bench
