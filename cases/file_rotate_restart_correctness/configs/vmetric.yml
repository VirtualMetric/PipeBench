devices:
  - id: 1
    name: file-bench
    type: file
    properties:
      # Glob tail across /data/*.log so vmetric sees both the new
      # input.log AND the archived input.log.1 after restart. Harness
      # SIGTERMs the subject mid-test; on restart vmetric reads its
      # per-file CacheInfo from /storage/cache and resumes from the
      # saved offset on each inode (the renamed archive + the new
      # live file).
      path: "/data/*.log"
      poll_interval: 1
      # Cache must survive the SIGTERM/restart for resume to work;
      # leaving ignore_cache at default (false) is the whole point.
      start_date: -1
      ignore_time: true
      ignore_old_date: true
      ignore_retention: true
      compute_pattern: false
      compute_level: false
      line_parser:
        type: newline
targets:
  - name: tcp-target-bench
    type: tcp
    properties:
      address: "receiver"
      port: 9001
routes:
  - name: file-to-tcp-bench
    devices:
      - name: file-bench
    targets:
      - name: tcp-target-bench
