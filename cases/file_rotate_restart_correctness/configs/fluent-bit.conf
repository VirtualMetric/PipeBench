# Fluent Bit's tail input tracks per-inode offsets in a SQLite "db" file.
# Glob path + DB together let it pick up input.log.1 after a rotation that
# happened while it was offline and resume from the saved offset — instead
# of re-reading the archive from 0 (which would produce duplicates).
[SERVICE]
    Flush        1
    Log_Level    warn

[INPUT]
    Name         tail
    Path         /data/input.log*
    Read_from_Head true
    DB           /var/log/flb-tail.db
    DB.Sync      Normal
    DB.locking   true

[OUTPUT]
    Name         tcp
    Match        *
    Host         receiver
    Port         9001
    Format       json_lines
