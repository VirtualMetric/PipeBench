@version: 4.2

# wildcard-file() discovers every file matching the pattern (input.log AND
# input.log.1) and persists per-file read state via syslog-ng's persist file
# (/var/lib/syslog-ng/syslog-ng.persist). On restart it reopens each known
# file at the last-acked offset, so the un-read tail of input.log.1 is
# resumed instead of forgotten — which is exactly what plain file() would
# do here.
source s_file {
    wildcard-file(
        base-dir("/data")
        filename-pattern("*.log")
        flags(no-parse)
        follow-freq(0.1)
        recursive(no)
    );
};

destination d_tcp {
    tcp(
        "receiver"
        port(9001)
        template("${MESSAGE}\n")
    );
};

log {
    source(s_file);
    destination(d_tcp);
};
