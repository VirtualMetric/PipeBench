# bindplane-agent → NetFlow v5 head-to-head config.
#
# bindplane-agent is observIQ's distribution of otel-collector-contrib
# (https://github.com/observIQ/bindplane-otel-collector). Same config
# schema; this file is intentionally byte-identical to otel-collector.yaml
# so head-to-head numbers measure the distribution overhead alone.
#
# Receiver: netflowreceiver — decodes NetFlow v5/v9 + IPFIX, emits one
# LogRecord per record with flow fields in attributes (Body empty).
# Processor: transform/copy_src_to_body — copies source.address into
# the LogRecord Body so the syslog exporter carries it through.
# Exporter: syslog over TCP to the bench receiver on :9001.

receivers:
  netflow:
    scheme: netflow
    hostname: 0.0.0.0
    port: 2055
    sockets: 1
    workers: 2

processors:
  transform/copy_src_to_body:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - set(body, attributes["source.address"])

exporters:
  syslog:
    endpoint: receiver
    port: 9001
    network: tcp
    protocol: rfc3164
    tls:
      insecure: true

service:
  pipelines:
    logs:
      receivers: [netflow]
      processors: [transform/copy_src_to_body]
      exporters: [syslog]
