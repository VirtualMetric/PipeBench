# Cribl Stream NetFlow & IPFIX source.
#
# Cribl Stream supports NetFlow v5/v9 + IPFIX over UDP. The source
# breaks out flow fields into top-level event fields (srcaddr,
# dstaddr, srcport, dstport, etc.), so a tcpjson destination
# downstream emits each event as a JSON line containing
# `"srcaddr":"10.99.x.y"` — the bench's required-substring check
# (`10.99.`) lands inside that.
#
# NOTE: cribl 4.17 doesn't publish an authoritative YAML schema for
# the NetFlow source in its public docs. Field names below are
# best-effort, derived from the cribl image's source/netflow docs;
# verify against a running cribl-stream:4.17.0 if records don't
# arrive at the receiver.

inputs:
  bench_netflow_in:
    type: netflow
    disabled: false
    host: 0.0.0.0
    port: 2055
    versions:
      v5: true
      v9: true
      ipfix: true
    sendToRoutes: true
    pqEnabled: false
