<Input tcp_in>
    Module im_tcp
    Host 0.0.0.0
    Port 9000
</Input>

<Processor disk_buffer>
    Module pm_buffer
    MaxSize 65536
    Type Disk
    Directory /var/spool/nxlog
</Processor>

<Output tcp_out>
    Module om_tcp
    Host receiver
    Port 9001
</Output>

<Route bench>
    Path tcp_in => disk_buffer => tcp_out
</Route>
