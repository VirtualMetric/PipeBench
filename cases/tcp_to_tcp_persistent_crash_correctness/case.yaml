name: tcp_to_tcp_persistent_crash_correctness
type: persistence_crash_correctness
description: "Verifies durable persistence across an ungraceful subject crash (SIGKILL): send logs, kill subject without grace, start receiver, restart subject, verify all logs arrive"

duration: 10s
warmup: 10s

generator:
  mode: tcp
  target: "subject:9000"
  rate: 25000
  total_lines: 25000
  line_size: 256
  format: raw

receiver:
  mode: tcp
  listen: ":9001"

subjects:
  - vmetric
  - vector
  - fluent-bit
  - fluentd
  - logstash
  - nxlog
  - axosyslog
  - tenzir
  - cribl-stream

correctness:
  validate_dedup: true
  expected_loss_pct: 0.0

configurations:
  default:
    description: "Send logs, SIGKILL subject (no flush), start receiver, restart subject, verify delivery"
