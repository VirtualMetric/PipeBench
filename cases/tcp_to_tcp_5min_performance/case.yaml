name: tcp_to_tcp_5min_performance
type: performance
description: "Measures sustained throughput of a TCP-in to TCP-out pipeline with no transforms (5 minutes)"

# Total test duration (after warmup)
duration: 300s
# Wait for the subject to be ready before the generator starts sending
warmup: 10s

generator:
  mode: tcp
  # "subject" resolves to the subject container's hostname inside the bench network
  target: "subject:9000"
  rate: 0           # unlimited — push as fast as possible
  line_size: 256    # bytes per log line
  format: raw

receiver:
  mode: tcp
  listen: ":9001"

subjects:
  - vmetric
  - vector
  - fluent-bit
  - fluentd
  - logstash
  - axosyslog

configurations:
  default:
    description: "No transforms — raw TCP passthrough"
