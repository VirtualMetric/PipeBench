# Vector configuration for tcp_to_sns_performance — TCP in, aws_sns sink to
# LocalStack. Credentials/region come from the harness-injected AWS_* env.

[sources.in]
type = "socket"
mode = "tcp"
address = "0.0.0.0:9000"
decoding.codec = "bytes"
framing.method = "newline_delimited"

[sinks.out]
type = "aws_sns"
inputs = ["in"]
topic_arn = "arn:aws:sns:us-east-1:000000000000:bench-topic"
region = "us-east-1"
endpoint = "http://localstack:4566"

[sinks.out.healthcheck]
enabled = false

[sinks.out.encoding]
codec = "text"
