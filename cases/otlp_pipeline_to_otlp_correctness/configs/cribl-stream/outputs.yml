# Cribl Stream OTLP/HTTP destination to bench receiver.
#
# Destination type is `open_telemetry` in Cribl Stream 4.17.0.
# `type: otlp` initializes but cannot route events and causes
# "unknown output type otlp" backpressure. For HTTP, endpoint must
# include the scheme so Cribl can derive /v1/logs.

outputs:
  default:
    defaultId: bench_otel_out
    type: default
  bench_otel_out:
    type: open_telemetry
    endpoint: http://receiver:4318
    protocol: http
    otlpVersion: 1.3.1
    compression: gzip
    tls:
      disabled: true
