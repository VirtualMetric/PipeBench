# axosyslog → OTLP/gRPC head-to-head config.
#
# AxoSyslog 4.24 ships `opentelemetry()` as both a source and a
# destination driver. Both are gRPC-only (no HTTP variant), which
# is why axosyslog only participates in the gRPC case — the generic
# HTTP-in / HTTP-out case has no axosyslog config.
#
# NOTE: axosyslog parses incoming OTLP into syslog-ng's internal
# log model (body lands in ${MESSAGE}) and re-emits via the OTel
# destination. The generator embeds "OTEL-<seq>" in every record's
# body, and the bench correctness check verifies "OTEL-" survives
# the round-trip; if axosyslog reformats ${MESSAGE} on the way out
# the correctness case will surface that as a substring-mismatch.

@version: 4.24

source s_otlp {
    opentelemetry(
        port(4317)
    );
};

destination d_otlp {
    opentelemetry(
        url("receiver:4317")
    );
};

log {
    source(s_otlp);
    destination(d_otlp);
};
