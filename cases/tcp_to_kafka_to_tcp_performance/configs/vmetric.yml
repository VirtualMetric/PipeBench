# Two routes in one director, exercising both the Kafka TARGET and DEVICE:
#   Route A: tcp-in (TCP device :9000)  -> kafka-out (Kafka target -> topic bench)
#   Route B: kafka-in (Kafka device <- topic bench) -> tcp-out (TCP target -> receiver:9001)
# Records flow TCP -> Kafka -> TCP, round-tripping through Redpanda.
devices:
  - id: 1
    name: tcp-in
    type: tcp
    properties:
      address: "0.0.0.0"
      port: 9000
  - id: 2
    name: kafka-in
    type: kafka
    properties:
      address: "redpanda"
      port: 9092
      topic: "bench"
      group: "bench"
targets:
  - name: kafka-out
    type: kafka
    properties:
      address: "redpanda"
      port: 9092
      topic: "bench"
      # batch_mode defaults to "individual" -> one record per Kafka message,
      # so the Kafka device reads one record per message and the round-trip
      # preserves the record count 1:1.
  - name: tcp-out
    type: tcp
    properties:
      address: "receiver"
      port: 9001
# Each route is bound to a single device via a device-static `if`. Without it,
# vmetric fans every device out to every target, which would send kafka-in's
# records back into kafka-out and create an infinite Kafka feedback loop
# (bench -> kafka-in -> kafka-out -> bench -> ...). The `if` confines each
# device to exactly one target so the flow is strictly tcp-in -> kafka-out and
# kafka-in -> tcp-out.
routes:
  - name: tcp-to-kafka
    if: device.name == "tcp-in"
    devices:
      - name: tcp-in
    targets:
      - name: kafka-out
  - name: kafka-to-tcp
    if: device.name == "kafka-in"
    devices:
      - name: kafka-in
    targets:
      - name: tcp-out
