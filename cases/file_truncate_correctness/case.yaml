name: file_truncate_correctness
type: correctness
description: "Verifies no data loss when a log file is directly truncated"

duration: 60s
warmup: 10s

generator:
  mode: file
  target: "/data/input.log"
  rate: 500
  line_size: 256
  format: raw
  connections: 1
  file_rotation:
    mode: truncate
    at: 30s
    quiesce: 200ms

receiver:
  mode: tcp
  listen: ":9001"

subjects:
  - vmetric
  - vector
  - fluent-bit
  - fluentd
  - filebeat
  - logstash
  - nxlog
  - axosyslog
  - tenzir
  - cribl-stream

correctness:
  validate_dedup: true
  expected_loss_pct: 0.0

configurations:
  default:
    description: "Tail file, truncate mid-test"
