@version: 4.2

source s_file {
    file(
        "/data/input.log"
        flags(no-parse)
        follow-freq(0.1)
        log-iw-size(50000)
        log-fetch-limit(1000)
    );
};

destination d_tcp {
    tcp(
        "receiver"
        port(9001)
    );
};

log {
    source(s_file);
    destination(d_tcp);
};
