devices:
  - id: 1
    name: tcp-in
    type: tcp
    properties:
      address: "0.0.0.0"
      port: 9000
  - id: 2
    name: kafka-in
    type: kafka
    properties:
      address: "redpanda"
      port: 9092
      topic: "bench"
      group: "bench"
      # Split each json_array message back into one event per array element.
      split_mode: json_array
targets:
  - name: kafka-out
    type: kafka
    properties:
      address: "redpanda"
      port: 9092
      topic: "bench"
      # Pack up to 100 events into one Kafka message as a JSON array
      # ([{...},...]) instead of one message per event.
      batch_mode: json_array
      max_events: 100
  - name: tcp-out
    type: tcp
    properties:
      address: "receiver"
      port: 9001
routes:
  - name: tcp-to-kafka
    if: device.name == "tcp-in"
    devices:
      - name: tcp-in
    targets:
      - name: kafka-out
  - name: kafka-to-tcp
    if: device.name == "kafka-in"
    devices:
      - name: kafka-in
    targets:
      - name: tcp-out
