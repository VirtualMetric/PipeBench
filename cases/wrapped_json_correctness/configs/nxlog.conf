<Extension _json>
    Module xm_json
</Extension>

<Input tcp_in>
    Module im_tcp
    Host 0.0.0.0
    Port 9000
    Exec parse_json(); \
         $raw_event = to_json();
</Input>

<Output tcp_out>
    Module om_tcp
    Host receiver
    Port 9001
</Output>

<Route bench>
    Path tcp_in => tcp_out
</Route>
