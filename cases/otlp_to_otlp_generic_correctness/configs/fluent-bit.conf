# fluent-bit → OTLP/HTTP head-to-head config.
#
# Input: opentelemetry — binds 4318 and serves both HTTP and gRPC
# OTLP on the same port (HTTP/2-multiplexed) since fluent-bit 3.0+.
# The generic case exercises the HTTP path; gRPC requests on this
# same port also work, but the bench's grpc-variant case targets a
# separate gRPC port and is configured per-subject for that.
#
# Output: opentelemetry — forwards each batch to the bench receiver's
# /v1/logs endpoint over HTTP+protobuf with gzip compression.

[SERVICE]
    Flush         1
    Daemon        Off
    Log_Level     info

[INPUT]
    Name              opentelemetry
    Listen            0.0.0.0
    Port              4318
    Tag               otel.logs

[OUTPUT]
    Name              opentelemetry
    Match             *
    Host              receiver
    Port              4318
    Logs_uri          /v1/logs
    Compress          gzip
