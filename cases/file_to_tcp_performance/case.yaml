name: file_to_tcp_performance
type: performance
description: "Measures throughput of tailing a file and forwarding over TCP"

duration: 60s
warmup: 10s

generator:
  mode: file
  target: "/data/input.log"
  rate: 0
  line_size: 256
  format: raw

receiver:
  mode: tcp
  listen: ":9001"

subjects:
  - vector
  - fluent-bit
  - fluentd
  - logstash
  - axosyslog

configurations:
  default:
    description: "Tail a file, forward over TCP"
