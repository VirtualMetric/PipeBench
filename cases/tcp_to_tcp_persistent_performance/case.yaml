name: tcp_to_tcp_persistent_performance
type: performance
description: "Measures throughput of a TCP-in to TCP-out pipeline with disk persistence enabled"

# Total test duration (after warmup)
duration: 60s
warmup: 10s

generator:
  mode: tcp
  target: "subject:9000"
  rate: 0           # unlimited
  line_size: 256
  format: raw

receiver:
  mode: tcp
  listen: ":9001"

subjects:
  - vmetric
  - vector
  - fluent-bit
  - fluentd
  - logstash
  - nxlog
  - axosyslog
  - tenzir
  - cribl-stream

configurations:
  default:
    description: "TCP passthrough with disk persistence enabled"
