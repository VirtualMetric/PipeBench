<source>
  @type tcp
  tag bench
  bind 0.0.0.0
  port 9000
  <parse>
    @type none
  </parse>
</source>

<match bench>
  @type forward
  <server>
    host receiver
    port 9001
  </server>
  <buffer>
    @type file
    path /tmp/fluentd-buffer/
    flush_interval 1s
    total_limit_size 256m
  </buffer>
</match>
