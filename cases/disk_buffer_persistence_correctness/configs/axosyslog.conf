@version: 4.2

source s_tcp {
    tcp(
        ip("0.0.0.0")
        port(9000)
        flags(no-parse)
    );
};

destination d_tcp {
    tcp(
        "receiver"
        port(9001)
        template("${MESSAGE}\n")
        disk-buffer(
            reliable(no)
            capacity-bytes(4294967296)
            dir("/var/lib/syslog-ng/disk-buffer/")
        )
    );
};

log {
    source(s_tcp);
    destination(d_tcp);
};
