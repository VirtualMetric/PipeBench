devices:
  - id: 1
    name: tcp-bench
    type: tcp
    properties:
      address: "0.0.0.0"
      port: 9000
targets:
  - name: kinesis-target-bench
    type: amazonkinesis
    properties:
      endpoint: "http://localstack:4566"
      key: "test"
      secret: "test"
      region: "us-east-1"
      stream: "bench-stream"
routes:
  - name: tcp-to-kinesis-bench
    devices:
      - name: tcp-bench
    targets:
      - name: kinesis-target-bench
