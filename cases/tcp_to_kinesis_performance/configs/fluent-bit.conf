[SERVICE]
    Flush        1
    Log_Level    warn

[INPUT]
    Name         tcp
    Listen       0.0.0.0
    Port         9000
    Format       none
    Chunk_Size   256k
    Buffer_Size  512k

[OUTPUT]
    Name         kinesis_streams
    Match        *
    stream       bench-stream
    region       us-east-1
    # Documented LocalStack form: bare host in `endpoint`, port set
    # separately (a scheme or :port suffix goes straight to getaddrinfo
    # and breaks DNS). KNOWN BROKEN on fluent-bit 5.0: the aws_client
    # always speaks TLS to custom endpoints and hard-enforces certificate
    # verification — LocalStack's self-signed cert is rejected and no
    # config knob (tls off / tls.verify off) is honored, so this subject
    # cannot pass this case until upstream adds an insecure-TLS option.
    endpoint     localstack
    port         4566

    log_key      log
