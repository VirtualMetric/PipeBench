name: set_field_performance
type: performance
description: "Measures baseline pipeline engine overhead: add one field per record using each subject's native transform"

duration: 60s
warmup: 10s

generator:
  mode: tcp
  target: "subject:9000"
  rate: 0
  line_size: 256
  format: raw

receiver:
  mode: tcp
  listen: ":9001"

subjects:
  - vmetric
  - vector
  - fluent-bit
  - fluentd
  - logstash
  - nxlog
  - axosyslog
  - tenzir
  - cribl-stream

configurations:
  default:
    description: "TCP in, add one field via native transform, TCP out"
