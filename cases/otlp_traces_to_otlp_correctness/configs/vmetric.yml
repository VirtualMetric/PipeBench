persistent_storage:
  status: true
devices:
  - id: 1
    name: otel-bench
    type: otel
    properties:
      address: "0.0.0.0"
      # gRPC disabled so this case isolates the HTTP ingress path: a regression
      # serving gRPC instead of HTTP fails (nothing bound on 4317) instead of
      # silently passing on an always-open listener.
      otlp_grpc_status: false
      otlp_http_status: true
      # Traces-only case: logs + metrics explicitly off so the disabled
      # signals return 404 (HTTP) rather than silently accepting and
      # discarding — exercises our per-signal toggle.
      otlp_logs_status: false
      otlp_metrics_status: false
      otlp_traces_status: true

targets:
  - name: otlp-target-bench
    type: otlp
    properties:
      # OTLP/HTTP endpoint of the bench receiver. The receiver mounts
      # /v1/traces there and counts one record per span.
      url: "http://receiver:4318"
      path: "/v1/traces"
      format: "protobuf"
      # gzip on by default — matches what every major OTLP client
      # emits and what the bench receiver tests for.
      compression: true

routes:
  - name: otel-to-otlp-bench
    devices:
      - name: otel-bench
    targets:
      - name: otlp-target-bench
