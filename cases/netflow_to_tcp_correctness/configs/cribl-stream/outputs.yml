# Cribl Stream tcpjson destination → bench TCP receiver.
#
# tcpjson emits one JSON-serialized event per TCP line — exactly
# what the bench TCP receiver expects (newline-delimited lines,
# substring `10.99.` lands inside the JSON via srcaddr).

outputs:
  default:
    defaultId: bench_tcp_out
    type: default
  bench_tcp_out:
    type: tcpjson
    host: receiver
    port: 9001
    nestedFields: none
    throttleRatePerSec: "0"
    compression: none
    tls:
      disabled: true
    authType: manual
