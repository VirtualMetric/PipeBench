devices:
  - id: 1
    name: netflow-bench
    type: netflow
    properties:
      address: "0.0.0.0"
      port: 2055
      # reuse / workers intentionally omitted — defaults are reuse=true
      # and workers=NumCPU, which is what the SO_REUSEPORT fan-out is
      # designed for. Setting them here once worked around a missing
      # workers-clamp in the flow GetConfig path; that has since been
      # fixed (config.go: workers forced to 1 when reuse is off, same
      # as the TCP listener's GetNetConfig). Leaving them at default
      # also exercises the typical out-of-the-box configuration.
targets:
  - name: tcp-target-bench
    type: tcp
    properties:
      address: "receiver"
      port: 9001
routes:
  - name: netflow-to-tcp-bench
    devices:
      - name: netflow-bench
    targets:
      - name: tcp-target-bench
