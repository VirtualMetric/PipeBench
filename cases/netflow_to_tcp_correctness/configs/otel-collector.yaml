# otel-collector → NetFlow v5 head-to-head config.
#
# Receiver: netflowreceiver (contrib distro). Decodes NetFlow v5/v9
# + IPFIX over UDP, emits one LogRecord per flow record. Crucially
# the receiver puts flow fields in *attributes* (source.address,
# destination.address, etc.) and leaves Body empty.
#
# Processor: transform/copy_src_to_body — copies attributes["source.address"]
# into the LogRecord Body so that downstream string-oriented exporters
# (e.g. syslog) can carry the IP through. Without this the syslog line
# arrives at the bench receiver with an empty message and the
# required-substring check (`10.99.`) fails.
#
# Exporter: syslog over TCP — newline-delimited RFC 3164 lines to
# the bench TCP receiver on :9001. The receiver doesn't care about
# the syslog framing, only that each line contains "10.99.".

receivers:
  netflow:
    scheme: netflow
    hostname: 0.0.0.0
    port: 2055
    sockets: 1
    workers: 2

processors:
  transform/copy_src_to_body:
    error_mode: ignore
    log_statements:
      - context: log
        statements:
          - set(body, attributes["source.address"])

exporters:
  syslog:
    endpoint: receiver
    port: 9001
    network: tcp
    protocol: rfc3164
    tls:
      insecure: true

service:
  pipelines:
    logs:
      receivers: [netflow]
      processors: [transform/copy_src_to_body]
      exporters: [syslog]
