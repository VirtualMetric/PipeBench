# vector → OTLP/HTTP head-to-head config.
#
# Source: opentelemetry — exposes both gRPC (4317) and HTTP (4318)
# endpoints. Vector's OTLP source binds both unconditionally, which
# matches the bench generator's expectations.
#
# Sink: opentelemetry — forwards via HTTP+protobuf to the bench
# receiver's /v1/logs. The `otlp` codec emits OTLP-compliant
# protobuf bodies (NOT JSON — `codec = "json"` produces bodies
# the receiver fails to decode under the protobuf Content-Type).

[sources.otel_in]
type = "opentelemetry"
# Preserve the raw OTLP envelope (resourceLogs/scopeLogs/logRecords)
# instead of flattening to Vector's native per-record event shape.
# Without this, the `otlp` sink codec rejects every event with
# "Log event does not contain OTLP top-level fields (resourceLogs
# or resourceMetrics)" and silently drops the whole stream — 100%
# loss. With it, the source→sink path is a native OTLP passthrough,
# matching what otel-collector / fluent-bit / vmetric do.
use_otlp_decoding = true

  [sources.otel_in.grpc]
  address = "0.0.0.0:4317"

  [sources.otel_in.http]
  address = "0.0.0.0:4318"

[sinks.otel_out]
type = "opentelemetry"
inputs = ["otel_in.logs"]

  [sinks.otel_out.protocol]
  type = "http"
  uri = "http://receiver:4318/v1/logs"
  method = "post"
  encoding.codec = "otlp"
  # The `otlp` codec sets its own Content-Type (application/x-protobuf)
  # and emits a bare ExportLogsServiceRequest protobuf body. Forcing
  # the header or layering gzip compression on top makes Vector emit
  # bytes the receiver decodes as "invalid wire-format" — so neither
  # is set here, matching Vector's own opentelemetry-logs e2e fixture.
  # (vmetric / otel-collector run gzip on their OTLP-out path; Vector
  # 0.54's otlp codec can't, so this leg is uncompressed.)
