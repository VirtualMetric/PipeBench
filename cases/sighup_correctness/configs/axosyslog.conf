@version: 4.2

source s_tcp {
    tcp(
        ip("0.0.0.0")
        port(9000)
        max-connections(500)
        log-iw-size(500000)
        log-fetch-limit(1000)
        flags(no-parse)
    );
};

destination d_tcp {
    tcp(
        "receiver"
        port(9001)
        template("${MESSAGE}\n")
    );
};

log {
    source(s_tcp);
    destination(d_tcp);
    flags(flow-control);
};
