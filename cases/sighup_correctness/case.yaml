name: sighup_correctness
type: correctness
description: "Verifies no data loss during config reload via SIGHUP"

duration: 60s
warmup: 10s

generator:
  mode: tcp
  target: "subject:9000"
  rate: 1000
  line_size: 256
  format: raw

receiver:
  mode: tcp
  listen: ":9001"

subjects:
  - vmetric
  - vector
  - fluent-bit
  - fluentd
  - logstash
  - axosyslog

correctness:
  validate_order: false
  validate_dedup: true
  expected_loss_pct: 0.0

configurations:
  default:
    description: "TCP passthrough, SIGHUP sent mid-test"
