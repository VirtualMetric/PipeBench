[SERVICE]
    Flush        1
    Grace        10
    Log_Level    warn

# Round-trip through Kafka in ONE fluent-bit instance. Tag/Match keeps the two
# legs separate so they never cross (no fan-out loop):
#   tcp input  (tag tcpin)  -> kafka output (Match tcpin)  -> topic bench
#   kafka input (tag kafkain) -> tcp output (Match kafkain) -> receiver:9001
# Records flow TCP -> Kafka -> TCP, 1:1 (each record is one Kafka message; the
# payload gets JSON-wrapped by fluent-bit but the count is preserved).

# TCP in -> Kafka out
[INPUT]
    Name      tcp
    Listen    0.0.0.0
    Port      9000
    Format    none
    Tag       tcpin

[OUTPUT]
    Name      kafka
    Match     tcpin
    Brokers   redpanda:9092
    Topics    bench

# Kafka in -> TCP out
[INPUT]
    Name      kafka
    Brokers   redpanda:9092
    Topics    bench
    Tag       kafkain
    format    none
    rdkafka.group.id            bench
    rdkafka.auto.offset.reset   earliest

[OUTPUT]
    Name      tcp
    Match     kafkain
    Host      receiver
    Port      9001
    Format    json_lines
