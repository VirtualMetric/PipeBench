# Round-trip through Kafka in ONE Logstash instance. Logstash has a single
# pipeline (every input feeds every output), so without routing the TCP input
# would reach BOTH the kafka and tcp outputs and loop. Tag each input and route
# conditionally so the two legs stay separate (no fan-out):
#   tcp input  (tag tcpin)   -> kafka output   -> topic bench
#   kafka input (tag kafkain) -> tcp output     -> receiver:9001
# Tags are Logstash-internal and not carried in the Kafka message (codec=>line
# emits only [message]), so a record read back from Kafka is tagged kafkain,
# not tcpin. Records flow TCP -> Kafka -> TCP, 1:1.
input {
  tcp {
    port => 9000
    codec => line
    tags => ["tcpin"]
  }
  kafka {
    bootstrap_servers => "redpanda:9092"
    topics => ["bench"]
    group_id => "bench"
    auto_offset_reset => "earliest"
    codec => line
    tags => ["kafkain"]
  }
}

output {
  if "tcpin" in [tags] {
    kafka {
      bootstrap_servers => "redpanda:9092"
      topic_id => "bench"
      codec => line
    }
  } else if "kafkain" in [tags] {
    tcp {
      host => "receiver"
      port => 9001
      codec => line
    }
  }
}
