devices:
  - id: 1
    name: tcp-bench
    type: tcp
    properties:
      address: "0.0.0.0"
      port: 9000
targets:
  - name: tcp-target-bench
    type: tcp
    properties:
      address: "receiver"
      port: 9001
routes:
  - name: tcp-to-tcp-bench
    devices:
      - name: tcp-bench
    pipelines:
      - name: syslog-parse
    targets:
      - name: tcp-target-bench
pipelines:
  - name: syslog-parse
    processors:
      - syslog:
          field: message
          ignore_missing: true
          ignore_failure: true
