<source>
  @type tcp
  tag bench
  bind 0.0.0.0
  port 9000
  <parse>
    @type none
  </parse>
</source>

<match bench>
  @type http
  endpoint http://receiver:9002
  open_timeout 5
  content_type application/x-ndjson
  json_array false
  <format>
    @type json
  </format>
  <buffer>
    @type file
    path /tmp/fluentd-buffer/
    flush_interval 1s
    flush_mode interval
    chunk_limit_size 1m
    total_limit_size 4g
  </buffer>
</match>
