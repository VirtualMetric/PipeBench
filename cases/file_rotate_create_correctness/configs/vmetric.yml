persistent_storage:
  status: true
devices:
  - id: 1
    name: file-bench
    type: file
    properties:
      # Glob tail across /data/*.log so vmetric sees both the archived
      # input.log.1 (renamed by the generator at the 30s mark) and the
      # new input.log. The reader's offset correlation across rotations
      # forwards the un-read tail of the archive without re-emitting
      # already-forwarded content.
      path: "/data/*.log"
      poll_interval: 1
      # Skip date / retention gating — correctness generator emits raw
      # lines without timestamps, so the default mtime / start-date
      # filters would discard everything.
      start_date: -1
      ignore_time: true
      ignore_old_date: true
      ignore_retention: true
      # Pattern + level enrichment off (raw passthrough); the receiver
      # asserts dedup / order on the line bytes, not the SystemD9/S9
      # metadata.
      compute_pattern: false
      compute_level: false
      line_parser:
        type: newline
targets:
  - name: tcp-target-bench
    type: tcp
    properties:
      address: "receiver"
      port: 9001
routes:
  - name: file-to-tcp-bench
    devices:
      - name: file-bench
    targets:
      - name: tcp-target-bench
